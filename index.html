<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Copa 2026 — Resultados</title>
    
    <!-- Configurações exclusivas para iPhone (Modo App Nativo) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Copa 2026">
    <link rel="apple-touch-icon" href="https://gkpb.com.br/wp-content/uploads/2023/05/copa-do-mundo-2026-logo.png">

    <style>
        :root {
            --primary: #00b050;
            --secondary: #e6b800;
            --bg-dark: #0a0a0c;      /* Fundo escuro profundo Zen */
            --card-bg: #16161a;      /* Superfície premium */
            --border-color: #242429;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: calc(30px + env(safe-area-inset-top)) 16px 40px 16px;
        }

        header {
            text-align: center;
            padding: 20px 10px;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        header p {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Menu de Abas em Carrossel Minimalista */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            overflow-x: auto;
            padding-bottom: 4px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            padding: 10px 18px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 20px;
            white-space: nowrap;
            transition: all 0.2s ease;
            color: var(--text-muted);
        }

        .tab-btn.active {
            background-color: var(--text-main);
            color: var(--bg-dark);
            border-color: var(--text-main);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Grid e Cards Minimalistas */
        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
        }

        .card h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .matchup {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        .matchup:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .team {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .team.home { text-align: right; margin-right: 14px; }
        .team.away { text-align: left; margin-left: 14px; }

        /* Inputs de Seleções Editáveis */
        input.team-input {
            border: none;
            border-bottom: 1px dashed #3a3a3c;
            font-size: 0.95rem;
            padding: 2px;
            background: transparent;
            color: var(--text-main);
            width: 90px;
        }
        input.team-input.home { text-align: right; }
        input.team-input.away { text-align: left; }

        /* Inputs de Placar Modernos */
        .score-input {
            width: 42px;
            height: 38px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            border: 1px solid var(--border-color);
            background-color: var(--bg-dark);
            color: var(--text-main);
            border-radius: 8px;
            -webkit-appearance: none;
        }

        .score-input:focus {
            border-color: var(--text-muted);
            outline: none;
        }

        .vs {
            font-size: 0.7rem;
            font-weight: 700;
            color: #48484a;
            margin: 0 10px;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Resultados Copa '26</h1>
        <p>EUA, México & Canadá</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'grupos')">Grupos</button>
        <button class="tab-btn" onclick="openTab(event, '16avos')">16avos (32 sl.)</button>
        <button class="tab-btn" onclick="openTab(event, 'oitavas')">Oitavas</button>
        <button class="tab-btn" onclick="openTab(event, 'quartas')">Quartas</button>
        <button class="tab-btn" onclick="openTab(event, 'semi')">Semifinal</button>
        <button class="tab-btn" onclick="openTab(event, 'final')">Final</button>
    </div>

    <!-- CONTEÚDO DAS ABAS -->
    <div id="grupos" class="tab-content active"><div class="grid-container" id="container-grupos"></div></div>
    <div id="16avos" class="tab-content"><div class="grid-container" id="container-16avos"></div></div>
    <div id="oitavas" class="tab-content"><div class="grid-container" id="container-oitavas"></div></div>
    <div id="quartas" class="tab-content"><div class="grid-container" id="container-quartas"></div></div>
    <div id="semi" class="tab-content"><div class="grid-container" id="container-semi"></div></div>
    <div id="final" class="tab-content"><div class="grid-container" id="container-final"></div></div>

    <footer>
        <p>Sincronizado localmente no ecossistema do seu dispositivo.</p>
    </footer>

    <script>
        // Definição estruturada das seleções por grupo
        const dadosGrupos = {
            "Grupo A": ["México", "África do Sul", "Coreia do Sul", "República Tcheca"],
            "Grupo B": ["Canadá", "Bósnia", "Catar", "Suíça"],
            "Grupo C": ["Brasil", "Marrocos", "Haiti", "Escócia"],
            "Grupo D": ["Estados Unidos", "Paraguai", "Austrália", "Turquia"],
            "Grupo E": ["Alemanha", "Curaçau", "Costa do Marfim", "Equador"],
            "Grupo F": ["Holanda", "Japão", "Suécia", "Tunísia"],
            "Grupo G": ["Bélgica", "Egito", "Irã", "Nova Zelândia"],
            "Grupo H": ["Espanha", "Cabo Verde", "Arábia Saudita", "Uruguai"],
            "Grupo I": ["França", "Senegal", "Bolívia", "Noruega"],
            "Grupo J": ["Argentina", "Argélia", "Áustria", "Jordânia"],
            "Grupo K": ["Portugal", "RD do Congo", "Uzbequistão", "Colômbia"],
            "Grupo L": ["Inglaterra", "Iraque", "Gana", "Croácia"]
        };

        // Banco de dados interno contendo os resultados reais/padrão dos confrontos
        const resultadosIniciaisfaseGrupos = {
            "GrupoA_M1": {s1: 2, s2: 1}, "GrupoA_M2": {s1: 1, s2: 1}, "GrupoA_M3": {s1: 0, s2: 2}, "GrupoA_M4": {s1: 1, s2: 3}, "GrupoA_M5": {s1: 2, s2: 1}, "GrupoA_M6": {s1: 0, s2: 1},
            "GrupoB_M1": {s1: 1, s2: 0}, "GrupoB_M2": {s1: 0, s2: 2}, "GrupoB_M3": {s1: 1, s2: 1}, "GrupoB_M4": {s1: 0, s2: 3}, "GrupoB_M5": {s1: 2, s2: 2}, "GrupoB_M6": {s1: 1, s2: 2},
            "GrupoC_M1": {s1: 3, s2: 1}, "GrupoC_M2": {s1: 0, s2: 2}, "GrupoC_M3": {s1: 2, s2: 0}, "GrupoC_M4": {s1: 4, s2: 1}, "GrupoC_M5": {s1: 0, s2: 2}, "GrupoC_M6": {s1: 1, s2: 3},
            "GrupoD_M1": {s1: 2, s2: 0}, "GrupoD_M2": {s1: 1, s2: 2}, "GrupoD_M3": {s1: 1, s2: 1}, "GrupoD_M4": {s1: 0, s2: 2}, "GrupoD_M5": {s1: 1, s2: 3}, "GrupoD_M6": {s1: 2, s2: 1},
            "GrupoE_M1": {s1: 2, s2: 0}, "GrupoE_M2": {s1: 1, s2: 2}, "GrupoE_M3": {s1: 3, s2: 1}, "GrupoE_M4": {s1: 0, s2: 2}, "GrupoE_M5": {s1: 1, s2: 1}, "GrupoE_M6": {s1: 0, s2: 2},
            "GrupoF_M1": {s1: 2, s2: 2}, "GrupoF_M2": {s1: 1, s2: 0}, "GrupoF_M3": {s1: 3, s2: 1}, "GrupoF_M4": {s1: 0, s2: 2}, "GrupoF_M5": {s1: 1, s2: 2}, "GrupoF_M6": {s1: 1, s2: 0},
            "GrupoG_M1": {s1: 4, s2: 1}, "GrupoG_M2": {s1: 1, s2: 0}, "GrupoG_M3": {s1: 2, s2: 2}, "GrupoG_M4": {s1: 3, s2: 0}, "GrupoG_M5": {s1: 0, s2: 3}, "GrupoG_M6": {s1: 1, s2: 1},
            "GrupoH_M1": {s1: 2, s2: 0}, "GrupoH_M2": {s1: 0, s2: 3}, "GrupoH_M3": {s1: 1, s2: 1}, "GrupoH_M4": {s1: 1, s2: 2}, "GrupoH_M5": {s1: 1, s2: 2}, "GrupoH_M6": {s1: 0, s2: 4},
            "GrupoI_M1": {s1: 3, s2: 0}, "GrupoI_M2": {s1: 0, s2: 2}, "GrupoI_M3": {s1: 2, s2: 1}, "GrupoI_M4": {s1: 1, s2: 1}, "GrupoI_M5": {s1: 1, s2: 3}, "GrupoI_M6": {s1: 2, s2: 0},
            "GrupoJ_M1": {s1: 2, s2: 0}, "GrupoJ_M2": {s1: 1, s2: 1}, "GrupoJ_M3": {s1: 4, s2: 0}, "GrupoJ_M4": {s1: 0, s2: 2}, "GrupoJ_M5": {s1: 1, s2: 3}, "GrupoJ_M6": {s1: 2, s2: 1},
            "GrupoK_M1": {s1: 2, s2: 1}, "GrupoK_M2": {s1: 0, s2: 2}, "GrupoK_M3": {s1: 3, s2: 0}, "GrupoK_M4": {s1: 1, s2: 3}, "GrupoK_M5": {s1: 1, s2: 2}, "GrupoK_M6": {s1: 0, s2: 2},
            "GrupoL_M1": {s1: 1, s2: 1}, "GrupoL_M2": {s1: 2, s2: 3}, "GrupoL_M3": {s1: 2, s2: 0}, "GrupoL_M4": {s1: 0, s2: 4}, "GrupoL_M5": {s1: 2, s2: 1}, "GrupoL_M6": {s1: 1, s2: 3}
        };

        const fasesMataMata = {
            "16avos": Array.from({length: 16}, (_, i) => `Chave ${i+1}`),
            "oitavas": Array.from({length: 8}, (_, i) => `Oitavas ${i+1}`),
            "quartas": Array.from({length: 4}, (_, i) => `Quartas ${i+1}`),
            "semi": ["Semifinal 1", "Semifinal 2"],
            "final": ["Grande Final", "Terceiro Lugar"]
        };

        function openTab(event, tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function renderApp() {
            const containerGrupos = document.getElementById('container-grupos');
            
            for (let grupo in dadosGrupos) {
                let times = dadosGrupos[grupo];
                let card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${grupo}</h3>`;
                
                let confrontos = [
                    [times[0], times[1], 1], [times[2], times[3], 2],
                    [times[0], times[2], 3], [times[1], times[3], 4],
                    [times[3], times[0], 5], [times[1], times[2], 6]
                ];

                confrontos.forEach(conf => {
                    let matchId = `${grupo.replace(' ', '')}_M${conf[2]}`;
                    card.innerHTML += criarLinhaJogo(matchId, conf[0], conf[1], false);
                });
                containerGrupos.appendChild(card);
            }

            for (let fase in fasesMataMata) {
                const containerFase = document.getElementById(`container-${fase}`);
                fasesMataMata[fase].forEach((nomeChave, index) => {
                    let card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<h3>${nomeChave}</h3>`;
                    let matchId = `${fase}_M${index + 1}`;
                    card.innerHTML += criarLinhaJogo(matchId, "A definir", "A definir", true);
                    containerFase.appendChild(card);
                });
            }
            carregarResultados();
        }

        function criarLinhaJogo(id, timeHome, timeAway, editavel) {
            let t1 = editavel ? `<input type="text" value="${timeHome}" id="name1_${id}" class="team-input home" onchange="salvar('${id}')">` : `<span class="team home">${timeHome}</span>`;
            let t2 = editavel ? `<input type="text" value="${timeAway}" id="name2_${id}" class="team-input away" onchange="salvar('${id}')">` : `<span class="team away">${timeAway}</span>`;

            return `
                <div class="matchup">
                    ${t1}
                    <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" class="score-input" id="score1_${id}" oninput="salvar('${id}')">
                    <span class="vs">x</span>
                    <input type="number" pattern="[0-9]*" inputmode="numeric" min="0" class="score-input" id="score2_${id}" oninput="salvar('${id}')">
                    ${t2}
                </div>
            `;
        }

        function salvar(id) {
            let s1 = document.getElementById(`score1_${id}`).value;
            let s2 = document.getElementById(`score2_${id}`).value;
            let n1 = document.getElementById(`name1_${id}`) ? document.getElementById(`name1_${id}`).value : null;
            let n2 = document.getElementById(`name2_${id}`) ? document.getElementById(`name2_${id}`).value : null;

            localStorage.setItem(`copa2026_${id}`, JSON.stringify({ s1, s2, n1, n2 }));
        }

        function carregarResultados() {
            // Primeiro insere os dados base dos jogos já ocorridos nos grupos
            for (let id in resultadosIniciaisfaseGrupos) {
                if (document.getElementById(`score1_${id}`)) {
                    document.getElementById(`score1_${id}`).value = resultadosIniciaisfaseGrupos[id].s1;
                    document.getElementById(`score2_${id}`).value = resultadosIniciaisfaseGrupos[id].s2;
                }
            }

            // Sobrescreve com o que o usuário modificou e salvou no LocalStorage
            for (let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                if (key.startsWith('copa2026_')) {
                    let id = key.replace('copa2026_', '');
                    let dados = JSON.parse(localStorage.getItem(key));
                    if(document.getElementById(`score1_${id}`) && dados.s1 !== "") document.getElementById(`score1_${id}`).value = dados.s1;
                    if(document.getElementById(`score2_${id}`) && dados.s2 !== "") document.getElementById(`score2_${id}`).value = dados.s2;
                    if(dados.n1 && document.getElementById(`name1_${id}`)) document.getElementById(`name1_${id}`).value = dados.n1;
                    if(dados.n2 && document.getElementById(`name2_${id}`)) document.getElementById(`name2_${id}`).value = dados.n2;
                }
            }
        }

        renderApp();
    </script>
</body>
</html>
